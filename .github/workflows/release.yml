name: Build Desktop Releases

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Intel
            runner: macos-15-intel
            arch: x64
            build_script: npm run dist:mac:intel
            artifact_name: trademax-macos-intel
          - label: Apple Silicon
            runner: macos-15
            arch: arm64
            build_script: npm run dist:mac:arm64
            artifact_name: trademax-macos-arm64
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      CSC_LINK: ${{ secrets.APPLE_SIGNING_CERTIFICATE_P12 }}
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_SIGNING_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Report signing mode
        run: |
          if [ -n "$CSC_LINK" ]; then
            echo "macOS signing enabled"
          else
            echo "macOS signing disabled; building unsigned artifact"
          fi

      - name: Build macOS artifact
        run: ${{ matrix.build_script }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*-mac-${{ matrix.arch }}.dmg
            release/*-mac-${{ matrix.arch }}.dmg.blockmap
            release/latest-mac.yml
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    env:
      WIN_CSC_LINK: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PFX }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Report signing mode
        run: |
          if ($env:WIN_CSC_LINK) {
            Write-Host "Windows signing enabled"
          } else {
            Write-Host "Windows signing disabled; building unsigned artifact"
          }

      - name: Build Windows artifact
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trademax-windows
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 14

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build Linux artifact
        run: npm run dist:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trademax-linux
          path: |
            release/*.AppImage
            release/*.AppImage.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-macos
      - build-windows
      - build-linux
    runs-on: ubuntu-22.04

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.dmg.blockmap
            release-assets/**/*.exe
            release-assets/**/*.exe.blockmap
            release-assets/**/*.AppImage
            release-assets/**/*.AppImage.blockmap
            release-assets/**/*.yml
